name: Dispatch Notifications

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification dispatch
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_API_SECRET }}" \
            "https://school21-pool-management-api.vercel.app/api/notifications/dispatch?limit=50"
