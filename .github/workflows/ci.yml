name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create backend virtualenv
        working-directory: backend
        run: python -m venv .venv

      - name: Install backend dependencies
        working-directory: backend
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Run daily quality checks
        run: ./scripts/daily_check.sh

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Create backend virtualenv
        working-directory: backend
        run: python -m venv .venv

      - name: Install backend dependencies
        working-directory: backend
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Run end-to-end smoke checks
        run: ./scripts/e2e_check.sh

  legacy-status:
    name: Legacy CI Status
    runs-on: ubuntu-latest
    needs:
      - quality
      - e2e
    if: always()
    steps:
      - name: Publish legacy CI status
        uses: actions/github-script@v7
        with:
          script: |
            const state =
              '${{ needs.quality.result }}' === 'success' &&
              '${{ needs.e2e.result }}' === 'success'
                ? 'success'
                : 'failure';
            const sha = context.eventName === 'pull_request'
              ? context.payload.pull_request.head.sha
              : context.sha;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'CI',
              description: state === 'success'
                ? 'Quality and e2e checks passed'
                : 'Quality or e2e checks failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
