name: Sync with Google Sheets

on:
  schedule:
    # Каждый час
    - cron: '0 * * * *'
  workflow_dispatch:
    # Возможность запустить вручную

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Flush sync outbox
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.NOTIFICATIONS_DISPATCH_SECRET }}" \
            "https://school21-pool-management-api.vercel.app/api/internal/sync"
