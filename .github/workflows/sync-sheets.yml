name: Export to Google Sheets

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Возможность запустить вручную

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Export configured pool snapshots
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_API_SECRET }}" \
            "https://school21-pool-management-api.vercel.app/api/internal/google-sheets/export"
